<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shield402 — Pre-Trade Safety Check</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      color: #fff;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .layout {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    .form-column {}
    .result-column {
      position: sticky;
      top: 2rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: #151520;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #5a5aff;
    }

    input::placeholder { color: #444; }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: #5a5aff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    button:hover { background: #4a4ae0; }
    button:disabled { background: #333; cursor: not-allowed; }

    .result {
      padding: 1.2rem;
      border-radius: 8px;
      display: none;
    }

    .result.show { display: block !important; }

    .result-placeholder {
      padding: 2rem 1.2rem;
      border-radius: 8px;
      background: #111118;
      border: 1px solid #2a2a3a;
      text-align: center;
      color: #555;
      font-size: 0.9rem;
    }

    .result.allow {
      background: #0a2a0a;
      border: 1px solid #1a5a1a;
    }

    .result.warn {
      background: #2a2200;
      border: 1px solid #5a4a00;
    }

    .result.block {
      background: #2a0a0a;
      border: 1px solid #5a1a1a;
    }

    .result.error {
      background: #1a1a2a;
      border: 1px solid #3a3a5a;
    }

    .decision-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }

    .decision-badge.allow { background: #1a5a1a; color: #5aff5a; }
    .decision-badge.warn { background: #5a4a00; color: #ffcc00; }
    .decision-badge.block { background: #5a1a1a; color: #ff5a5a; }

    .result-reason {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .result-recommendation {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.8rem;
      line-height: 1.4;
    }

    .result-meta {
      font-size: 0.75rem;
      color: #666;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .result-meta span { white-space: nowrap; }

    .rules-list {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid #2a2a3a;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      padding: 0.25rem 0;
      color: #999;
    }

    .rule-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rule-dot.triggered { background: #ff5a5a; }
    .rule-dot.ok { background: #3a3a4a; }

    .policy-params {
      margin-top: 0.8rem;
      padding: 0.6rem 0.8rem;
      background: #1a1a2a;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .policy-params .label { color: #888; }
    .policy-params .value { color: #5a5aff; font-weight: 600; }

    .api-key-section {
      margin-bottom: 1.5rem;
      padding: 0.8rem;
      background: #111118;
      border-radius: 6px;
      border: 1px solid #2a2a3a;
    }

    .api-key-section label {
      margin-bottom: 0.4rem;
    }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .preset-btn {
      padding: 0.4rem 0.8rem;
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      width: auto;
      margin-top: 0;
      font-weight: 400;
    }

    .preset-btn:hover {
      background: #2a2a3a;
      color: #fff;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #444;
    }

    footer a { color: #5a5aff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Shield402</h1>
  <p class="subtitle">Pre-trade safety check for Solana</p>

  <div class="layout">
    <div class="form-column">
      <div class="api-key-section">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="X-API-Key (leave empty if auth is disabled)">
      </div>

      <div class="presets">
        <button class="preset-btn" onclick="loadPreset('safe')">Safe trade</button>
        <button class="preset-btn" onclick="loadPreset('risky')">Risky trade</button>
        <button class="preset-btn" onclick="loadPreset('dangerous')">Dangerous trade</button>
      </div>

      <div class="form-group">
        <label>Input mint (Input token)</label>
        <input type="text" id="inputMint" placeholder="So11111111111111111111111111111111111111112" value="So11111111111111111111111111111111111111112">
      </div>

      <div class="form-group">
        <label>Output mint (Output token)</label>
        <input type="text" id="outputMint" placeholder="EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v" value="EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v">
      </div>

      <div class="row-3">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="amountIn" value="2" min="0" step="any">
        </div>
        <div class="form-group">
          <label>Slippage (bps)</label>
          <input type="number" id="slippageBps" value="50" min="0" max="10000">
        </div>
        <div class="form-group">
          <label>Priority fee</label>
          <input type="number" id="priorityFee" placeholder="optional" min="0">
        </div>
      </div>

      <div class="form-group">
        <label>Send mode</label>
        <select id="sendMode">
          <option value="protected">protected (Jito/MEV-protected)</option>
          <option value="standard">standard (default RPC)</option>
          <option value="unknown">unknown</option>
        </select>
      </div>

      <button id="checkBtn" onclick="checkTrade()">Check Trade Safety</button>
    </div>

    <div class="result-column">
      <div id="placeholder" class="result-placeholder">
        Configure a trade and click "Check Trade Safety" to see the risk assessment.
      </div>
      <div id="result" class="result"></div>
    </div>
  </div>

  <footer>
    <a href="https://github.com/Niftie27/shield402" target="_blank">GitHub</a> &middot; Policy v0.4.0
  </footer>

  <script>
    const presets = {
      safe: {
        inputMint: 'So11111111111111111111111111111111111111112',
        outputMint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
        amountIn: 2,
        slippageBps: 50,
        sendMode: 'protected',
        priorityFee: 5000,
      },
      risky: {
        inputMint: 'So11111111111111111111111111111111111111112',
        outputMint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
        amountIn: 10,
        slippageBps: 200,
        sendMode: 'standard',
        priorityFee: '',
      },
      dangerous: {
        inputMint: 'So11111111111111111111111111111111111111112',
        outputMint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
        amountIn: 60,
        slippageBps: 500,
        sendMode: 'standard',
        priorityFee: '',
      },
    };

    function loadPreset(name) {
      const p = presets[name];
      document.getElementById('inputMint').value = p.inputMint;
      document.getElementById('outputMint').value = p.outputMint;
      document.getElementById('amountIn').value = p.amountIn;
      document.getElementById('slippageBps').value = p.slippageBps;
      document.getElementById('sendMode').value = p.sendMode;
      document.getElementById('priorityFee').value = p.priorityFee;
    }

    async function checkTrade() {
      const btn = document.getElementById('checkBtn');
      const resultDiv = document.getElementById('result');
      const placeholder = document.getElementById('placeholder');
      btn.disabled = true;
      btn.textContent = 'Checking...';
      resultDiv.className = 'result';
      placeholder.style.display = 'none';

      const body = {
        chain: 'solana',
        input_mint: document.getElementById('inputMint').value.trim(),
        output_mint: document.getElementById('outputMint').value.trim(),
        amount_in: parseFloat(document.getElementById('amountIn').value),
        slippage_bps: parseInt(document.getElementById('slippageBps').value),
        send_mode: document.getElementById('sendMode').value,
      };

      const priorityFee = document.getElementById('priorityFee').value.trim();
      if (priorityFee) {
        body.priority_fee_lamports = parseInt(priorityFee);
      }

      const headers = { 'Content-Type': 'application/json' };
      const apiKey = document.getElementById('apiKey').value.trim();
      if (apiKey) {
        headers['X-API-Key'] = apiKey;
      }

      try {
        const res = await fetch('/check-trade', {
          method: 'POST',
          headers,
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          resultDiv.className = 'result error show';
          resultDiv.innerHTML = `
            <div class="result-reason">${data.message || 'Request failed'}</div>
            ${data.details ? `<div class="result-recommendation">${data.details.join('<br>')}</div>` : ''}
          `;
          return;
        }

        const decision = data.decision;
        resultDiv.className = `result ${decision} show`;

        let policyHtml = '';
        if (data.policy && Object.keys(data.policy).length > 0) {
          const params = Object.entries(data.policy)
            .map(([k, v]) => `<span class="label">${k.replace(/^recommended_/, '')}:</span> <span class="value">${v}</span>`)
            .join(' &middot; ');
          policyHtml = `<div class="policy-params">${params}</div>`;
        }

        const rulesHtml = data.rule_details
          ? data.rule_details.map(r => `
            <div class="rule">
              <div class="rule-dot ${r.triggered ? 'triggered' : 'ok'}"></div>
              ${r.rule_id}: ${r.message}
            </div>
          `).join('')
          : '';

        resultDiv.innerHTML = `
          <div class="decision-badge ${decision}">${decision}</div>
          <div class="result-reason">${data.reason}</div>
          <div class="result-recommendation">${data.recommendation}</div>
          ${policyHtml}
          <div class="result-meta">
            <span>Risk: ${data.risk_level}</span>
            <span>Confidence: ${data.confidence}</span>
            <span>Live: ${data.live_sources?.length ? data.live_sources.join(', ') : 'none'}</span>
            <span>Policy: ${data.policy_version}</span>
          </div>
          ${rulesHtml ? `<div class="rules-list">${rulesHtml}</div>` : ''}
        `;
      } catch (err) {
        resultDiv.className = 'result error show';
        resultDiv.innerHTML = `<div class="result-reason">Network error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Trade Safety';
      }
    }
  </script>
</body>
</html>
